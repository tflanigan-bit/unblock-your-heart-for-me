<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body { margin: 0; }
  pre {
    margin: 0;
    padding: 20px;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: monospace;
  }
</style>
</head>
<body>
<pre id="content"></pre>
<script>
fetch('merged.txt')
  .then(res => res.text())
  .then(text => { document.getElementById('content').textContent = text; })
  .catch(err => { document.getElementById('content').textContent = 'Error loading file: ' + err.message; });
</script>
</body>
</html>
