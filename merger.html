<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text File Merger</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f7f7f8;
    color: #1a1a1a;
  }
  h1 { font-size: 1.5rem; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }
  input[type="file"] {
    display: block;
    margin-bottom: 16px;
  }
  button {
    background: #1a1a1a;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
  }
  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  #status {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #555;
  }
  a#downloadLink {
    display: none;
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>Text File Merger</h1>
<p>Pick two .txt files. The output starts at the beginning of File 1 and ends at the end of File 2.</p>

<div class="card">
  <label for="file1">File 1 (start)</label>
  <input type="file" id="file1" accept=".txt,text/plain">

  <label for="file2">File 2 (end)</label>
  <input type="file" id="file2" accept=".txt,text/plain">

  <button id="mergeBtn">Merge Files</button>
  <div id="status"></div>
  <a id="downloadLink">Download merged.txt</a>
</div>

<script>
const file1Input = document.getElementById('file1');
const file2Input = document.getElementById('file2');
const mergeBtn = document.getElementById('mergeBtn');
const status = document.getElementById('status');
const downloadLink = document.getElementById('downloadLink');

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

mergeBtn.addEventListener('click', async () => {
  const f1 = file1Input.files[0];
  const f2 = file2Input.files[0];

  if (!f1 || !f2) {
    status.textContent = 'Please select both files.';
    return;
  }

  mergeBtn.disabled = true;
  status.textContent = 'Merging...';
  downloadLink.style.display = 'none';

  try {
    const [text1, text2] = await Promise.all([readFileAsText(f1), readFileAsText(f2)]);

    let merged = text1;
    if (merged.length > 0 && !merged.endsWith('\n')) {
      merged += '\n';
    }
    merged += text2;

    const blob = new Blob([merged], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);

    downloadLink.href = url;
    downloadLink.download = 'merged.txt';
    downloadLink.textContent = 'Download merged.txt';
    downloadLink.style.display = 'inline-block';

    status.textContent = 'Done. Click below to download.';
  } catch (err) {
    status.textContent = 'Error reading files: ' + err.message;
  } finally {
    mergeBtn.disabled = false;
  }
});
</script>

</body>
</html>
