<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text File Merger</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f7f7f8;
    color: #1a1a1a;
  }
  h1 { font-size: 1.5rem; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }
  input[type="file"] {
    display: block;
    margin-bottom: 16px;
  }
  button {
    background: #1a1a1a;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
  }
  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  #status {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #555;
  }
  a#downloadLink {
    display: none;
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>Text File Merger</h1>
<p>Pick up to 7 .txt files. The output starts at the beginning of File 1 and ends at the end of the last file you filled in, in order. Empty slots are skipped. Nothing is truncated.</p>

<div class="card">
  <label for="file1">File 1</label>
  <input type="file" id="file1" accept=".txt,text/plain">

  <label for="file2">File 2</label>
  <input type="file" id="file2" accept=".txt,text/plain">

  <label for="file3">File 3</label>
  <input type="file" id="file3" accept=".txt,text/plain">

  <label for="file4">File 4</label>
  <input type="file" id="file4" accept=".txt,text/plain">

  <label for="file5">File 5</label>
  <input type="file" id="file5" accept=".txt,text/plain">

  <label for="file6">File 6</label>
  <input type="file" id="file6" accept=".txt,text/plain">

  <label for="file7">File 7</label>
  <input type="file" id="file7" accept=".txt,text/plain">

  <button id="mergeBtn">Merge Files</button>
  <div id="status"></div>
  <a id="downloadLink">Download merged.txt</a>
</div>

<script>
const fileInputs = [1,2,3,4,5,6,7].map(n => document.getElementById('file' + n));
const mergeBtn = document.getElementById('mergeBtn');
const status = document.getElementById('status');
const downloadLink = document.getElementById('downloadLink');

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

mergeBtn.addEventListener('click', async () => {
  const files = fileInputs
    .map(input => input.files[0])
    .filter(f => f);

  if (files.length < 2) {
    status.textContent = 'Please select at least two files.';
    return;
  }

  mergeBtn.disabled = true;
  status.textContent = 'Merging ' + files.length + ' file(s)...';
  downloadLink.style.display = 'none';

  try {
    const texts = await Promise.all(files.map(readFileAsText));

    let merged = '';
    for (const text of texts) {
      merged += text;
      if (merged.length > 0 && !merged.endsWith('\n')) {
        merged += '\n';
      }
    }

    const blob = new Blob([merged], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);

    downloadLink.href = url;
    downloadLink.download = 'merged.txt';
    downloadLink.textContent = 'Download merged.txt';
    downloadLink.style.display = 'inline-block';

    status.textContent = 'Done. Click below to download.';
  } catch (err) {
    status.textContent = 'Error reading files: ' + err.message;
  } finally {
    mergeBtn.disabled = false;
  }
});
</script>

</body>
</html>
